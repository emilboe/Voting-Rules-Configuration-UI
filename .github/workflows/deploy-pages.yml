name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          npm install
          # Windows lockfiles often skip Linux optional native modules (npm bug).
          # Force platform bindings so Vite (Rollup) and Tailwind (lightningcss) work on ubuntu.
          ROLLUP_VER=$(node -p "require(require.resolve('rollup/package.json')).version")
          npm install "@rollup/rollup-linux-x64-gnu@${ROLLUP_VER}" --no-save
          # lightningcss does not export ./package.json — read version from disk
          LIGHTNING_VER=$(node -e "const p=require('path'),fs=require('fs');let d=p.dirname(require.resolve('lightningcss'));for(let i=0;i<8;i++){const x=p.join(d,'package.json');if(fs.existsSync(x)){const j=JSON.parse(fs.readFileSync(x,'utf8'));if(j.name==='lightningcss'){console.log(j.version);process.exit(0);}}d=p.dirname(d);}process.exit(1)")
          npm install "lightningcss-linux-x64-gnu@${LIGHTNING_VER}" --no-save

      - name: Build
        env:
          # Project Pages URL: https://<user>.github.io/<repo>/
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
